<title>סטטיסטיקה — תרגול למבחן</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root{
  --accent:#5145CD; --accent-soft:#EEECFB;
  --ok:#15803D; --ok-soft:#E6F4EA;
  --bad:#B91C1C; --bad-soft:#FDECEC;
  --warn:#B45309; --warn-soft:#FEF3E2;
  --bg:#F7F7FB; --card:#FFFFFF;
  --ink:#1A1A2E; --ink-2:#55556E; --ink-3:#8C8CA5;
  --line:#E3E3EF;
  --r:14px;
}
@media (prefers-color-scheme:dark){
  :root{
    --accent:#8B80F9; --accent-soft:#26234A;
    --ok:#4ADE80; --ok-soft:#14301F;
    --bad:#F87171; --bad-soft:#361A1A;
    --warn:#FBBF24; --warn-soft:#33270D;
    --bg:#111119; --card:#1A1A25;
    --ink:#EFEFF6; --ink-2:#A9A9C0; --ink-3:#71718C;
    --line:#2C2C3C;
  }
}
:root[data-theme="dark"]{
  --accent:#8B80F9; --accent-soft:#26234A;
  --ok:#4ADE80; --ok-soft:#14301F;
  --bad:#F87171; --bad-soft:#361A1A;
  --warn:#FBBF24; --warn-soft:#33270D;
  --bg:#111119; --card:#1A1A25;
  --ink:#EFEFF6; --ink-2:#A9A9C0; --ink-3:#71718C;
  --line:#2C2C3C;
}
:root[data-theme="light"]{
  --accent:#5145CD; --accent-soft:#EEECFB;
  --ok:#15803D; --ok-soft:#E6F4EA;
  --bad:#B91C1C; --bad-soft:#FDECEC;
  --warn:#B45309; --warn-soft:#FEF3E2;
  --bg:#F7F7FB; --card:#FFFFFF;
  --ink:#1A1A2E; --ink-2:#55556E; --ink-3:#8C8CA5;
  --line:#E3E3EF;
}
*{box-sizing:border-box}
body{
  direction:rtl; margin:0; background:var(--bg); color:var(--ink);
  font-family:"Assistant","Heebo","Arial Hebrew","Segoe UI",system-ui,sans-serif;
  font-size:17px; line-height:1.65; -webkit-text-size-adjust:100%;
}
.wrap{max-width:640px; margin:0 auto; padding:16px 14px 96px}
h1,h2,h3{text-wrap:balance; margin:0}
button{font-family:inherit; font-size:inherit; cursor:pointer; border:none}
button:focus-visible{outline:3px solid var(--accent); outline-offset:2px}

/* header */
.top{display:flex; align-items:center; gap:10px; padding:10px 0 16px}
.curve{flex:0 0 auto}
.top h1{font-size:19px; font-weight:800; letter-spacing:-.2px}
.top .sub{font-size:13px; color:var(--ink-3); font-weight:600}
.back{margin-inline-start:auto; background:none; color:var(--accent); font-weight:700; font-size:15px; padding:6px}

/* cards */
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:12px}
.card h2{font-size:17px; font-weight:800; margin-bottom:6px}
.card p{margin:0; color:var(--ink-2); font-size:15px}

/* mode buttons */
.modes{display:grid; gap:10px; margin-bottom:22px}
.mode{
  display:flex; align-items:center; gap:12px; text-align:right; width:100%;
  background:var(--card); border:1px solid var(--line); border-radius:var(--r);
  padding:15px 16px; color:var(--ink);
}
.mode:active{transform:scale(.99)}
.mode .ic{font-size:22px; flex:0 0 auto}
.mode b{display:block; font-size:16px; font-weight:800}
.mode span{display:block; font-size:13px; color:var(--ink-3); line-height:1.4}
.mode.primary{background:var(--accent); border-color:var(--accent); color:#fff}
.mode.primary span{color:rgba(255,255,255,.82)}

.h-sec{font-size:13px; font-weight:800; color:var(--ink-3); letter-spacing:.06em; margin:22px 0 10px}

/* topic rows */
.topic{
  display:flex; align-items:center; gap:12px; width:100%; text-align:right;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:13px 14px; margin-bottom:8px; color:var(--ink);
}
.topic .nm{flex:1; min-width:0}
.topic b{display:block; font-size:15px; font-weight:700}
.topic .meta{font-size:12px; color:var(--ink-3); font-variant-numeric:tabular-nums}
.bar{height:6px; border-radius:99px; background:var(--line); overflow:hidden; margin-top:6px}
.bar i{display:block; height:100%; border-radius:99px; background:var(--accent)}
.pill{
  flex:0 0 auto; font-size:11px; font-weight:800; padding:4px 9px; border-radius:99px;
  background:var(--line); color:var(--ink-2); white-space:nowrap;
}
.pill.ok{background:var(--ok-soft); color:var(--ok)}
.pill.mid{background:var(--warn-soft); color:var(--warn)}
.pill.bad{background:var(--bad-soft); color:var(--bad)}

/* question */
.qmeta{display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:12px}
.tag{font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:var(--accent-soft); color:var(--accent)}
.tag.src{background:var(--line); color:var(--ink-3)}
.tag.warnsrc{background:var(--warn-soft); color:var(--warn)}
.stem{font-size:17px; font-weight:600; line-height:1.6; white-space:pre-wrap; margin-bottom:16px}
.stem table{border-collapse:collapse; margin:10px 0; font-size:14px}
.stem th,.stem td{border:1px solid var(--line); padding:5px 10px}

.opts{display:grid; gap:9px}
.opt{
  display:flex; gap:11px; align-items:flex-start; text-align:right; width:100%;
  background:var(--card); border:1.5px solid var(--line); border-radius:12px;
  padding:13px 14px; color:var(--ink); font-size:16px; line-height:1.5;
}
.opt .ltr{
  flex:0 0 26px; height:26px; border-radius:8px; background:var(--line); color:var(--ink-2);
  font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center;
}
.opt.sel{border-color:var(--accent)}
.opt.sel .ltr{background:var(--accent); color:#fff}
.opt.right{border-color:var(--ok); background:var(--ok-soft)}
.opt.right .ltr{background:var(--ok); color:#fff}
.opt.wrong{border-color:var(--bad); background:var(--bad-soft)}
.opt.wrong .ltr{background:var(--bad); color:#fff}
.opt:disabled{cursor:default; opacity:1}

/* actions */
.acts{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap}
.btn{flex:1; min-width:110px; padding:14px; border-radius:12px; font-weight:800; font-size:16px; background:var(--accent); color:#fff}
.btn:disabled{opacity:.35}
.btn.ghost{background:transparent; border:1.5px solid var(--line); color:var(--ink-2); font-size:14px; flex:0 0 auto; min-width:0; padding:12px 14px}
.btn.wide{flex:1 0 100%}

/* boxes */
.box{border-radius:12px; padding:14px; margin-top:14px; font-size:15px; line-height:1.65}
.box b{font-weight:800}
.box.hint{background:var(--warn-soft); color:var(--ink); border:1px solid rgba(180,83,9,.25)}
.box.good{background:var(--ok-soft); border:1px solid rgba(21,128,61,.25)}
.box.bad{background:var(--bad-soft); border:1px solid rgba(185,28,28,.25)}
.box.trap{background:var(--accent-soft); border:1px solid rgba(81,69,205,.25)}
.box h4{margin:0 0 6px; font-size:14px; font-weight:800; letter-spacing:.02em}
.sol{white-space:pre-wrap; margin-top:8px}
.sol table{border-collapse:collapse; margin:8px 0; font-size:14px; width:100%}
.sol th,.sol td{border:1px solid var(--line); padding:5px 9px; text-align:right}
.dis{margin-top:10px; padding-top:10px; border-top:1px dashed var(--line)}
.dis div{margin-bottom:6px; font-size:14px; color:var(--ink-2)}

/* progress */
.prog{display:flex; align-items:center; gap:10px; font-size:12px; color:var(--ink-3); margin-bottom:14px; font-variant-numeric:tabular-nums}
.prog .bar{flex:1; margin:0}

/* results */
.big{font-size:52px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums; letter-spacing:-2px}
.center{text-align:center}
.muted{color:var(--ink-3); font-size:14px}
.katex{direction:ltr; font-size:1.02em}
.disp{direction:ltr; text-align:center; margin:12px 0; overflow-x:auto; overflow-y:hidden; padding:4px 0}
.boxed{
  display:inline-block; direction:ltr;
  background:var(--accent-soft); color:var(--accent);
  padding:3px 10px; border-radius:7px; font-weight:800;
}
</style>

</div>

 "מועד ב' תשפ\"ג (שחזור)", "sourceYear": "2023", "confidence": "likely", "stem": "במידה ואנו רוצים לשמור על סולם המדידה של המשתנה, מה נכון לגבי טרנספורמציה של הכפלה בקבוע שלילי?", "options": ["הטרנספורמציה מותרת כאשר המשתנה איכותי", "היא מותרת כאשר המשתנה בסולם שמי", "הטרנספורמציה אסורה רק עבור סולם יחס (מנה)", "מותרת עבור כל סוגי המשתנים"], "correctAnswer": 1, "shortExplanation": "הכפלה בקבוע שלילי הופכת את הסדר — ולכן מותרת **רק** בסולם שמי, שבו אין סדר בכלל.", "fullSolution": "הכפלה בקבוע שלילי עושה דבר אחד הרסני: **היא הופכת את הסדר**. הגדול הופך לקטן.\n\n- **שמי:** אין סדר מלכתחילה, אז אין מה להרוס. המספרים הם רק תוויות. **מותר** ✓\n- **סדר:** הסדר הוא כל מה שיש. הפיכתו הורסת את הסולם. **אסור** ✗\n- **רווח:** מותר רק $y=ax+b$ עם $a>0$. **אסור** ✗\n- **מנה:** מותר רק $y=ax$ עם $a>0$. **אסור** ✗\n\nרק שמי שורד → \\boxed{ב}\n\n⚠️ **שימי לב להבדל בין א' ל-ב'.** 'משתנה איכותי' כולל גם סולם שמי וגם סולם **סדר** — וסולם סדר **לא** שורד הכפלה בשלילי. לכן א' רחבה מדי ושגויה. התשובה חייבת להיות הצרה והמדויקת: **שמי**.", "distractorExplanations": ["'איכותי' רחב מדי — הוא כולל גם סולם **סדר**, שבו הכפלה בשלילי הופכת את הסדר ולכן אסורה. התשובה חייבת להיות ספציפית לשמי.", "", "הפוך לחלוטין. היא אסורה בסדר, ברווח **וגם** במנה — לא רק במנה.", "שגוי. היא אסורה ברוב הסולמות; מותרת רק בשמי."], "hint1": "מה הדבר היחיד שהכפלה במספר שלילי עושה למספרים? חשבי על 1, 2, 3 → -1, -2, -3.", "hint2": "היא הופכת את הסדר. אז השאלה היא: איזה סולם *לא אכפת לו* מהסדר?", "examTrap": "'איכותי' ≠ 'שמי'. איכותי כולל גם סדר. אם התשובה 'שמי' קיימת, היא המדויקת יותר.", "requiresCalculator": false, "estimatedTime": 75}, {"id": "s1-06", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "השפעה על ממוצע ופיזור", "skill": "הוספת תצפית ששווה לממוצע", "difficulty": 2, "sourceType": "official_practice", "sourceName": "שאלות חזרה רשמיות", "sourceYear": "2026", "confidence": "verified", "stem": "חוקרת בדקה ציוני מבחן של 40 תלמידים וקיבלה שהממוצע 82 וסטיית התקן 6. מאוחר יותר גילתה שחסרים חמישה ציונים – כולם היו שווים בדיוק 82. מה יקרה לממוצע ולסטיית התקן לאחר הוספת הציונים החסרים?", "options": ["הממוצע יקטן וסטיית התקן לא תשתנה", "הממוצע לא ישתנה וסטיית התקן תגדל", "הממוצע לא ישתנה וסטיית התקן תקטן", "לא ניתן לדעת מה יקרה לממוצע, סטיית התקן תקטן"], "correctAnswer": 2, "shortExplanation": "תצפית ששווה בדיוק לממוצע: **לא מזיזה את הממוצע**, ו**מקטינה את סטיית התקן** (מוסיפה 0 לסכום הסטיות אבל מגדילה את ה-n).", "fullSolution": "**הממוצע:** מוסיפים 5 ערכים ששווים בדיוק לממוצע הקיים (82). הסכום גדל ב-$5 \\times 82 = 410$, וה-n גדל ב-5.\n$$\\bar{x}_{new} = \\frac{40 \\times 82 + 410}{45} = \\frac{3280 + 410}{45} = \\frac{3690}{45} = 82$$\nהממוצע **לא משתנה**. ✓\n\n**סטיית התקן:** הנוסחה היא\n$$S = \\sqrt{\\frac{\\sum (x_i - \\bar{x})^2}{n}}$$\nכל אחת מ-5 התצפיות החדשות תורמת $(82-82)^2 = 0$ למונה. אז **המונה לא משתנה בכלל**. אבל **המכנה גדל** מ-40 ל-45.\n\nמונה קבוע ÷ מכנה גדול יותר = **מספר קטן יותר**. סטיית התקן **קטנה**.\n\n$$S_{new} = \\sqrt{\\frac{40 \\times 36}{45}} = \\sqrt{32} \\approx 5.66 < 6$$\n\n\\boxed{ג — הממוצע לא ישתנה וסטיית התקן תקטן}", "distractorExplanations": ["הממוצע לא יקטן — התצפיות החדשות שוות בדיוק לממוצע, אז הן לא מושכות אותו לשום כיוון.", "סטיית התקן לא תגדל — היא תקטן. תצפית בדיוק על הממוצע מוסיפה 0 לסכום הסטיות הריבועיות אבל מגדילה את n.", "", "ניתן בהחלט לדעת מה יקרה לממוצע: הוא יישאר 82. הוספת ערך ששווה לממוצע לעולם לא מזיזה אותו."], "hint1": "מה תורמת תצפית ששווה בדיוק לממוצע לסכום הסטיות הריבועיות $\\sum(x_i-\\bar{x})^2$?", "hint2": "היא תורמת **אפס** למונה — אבל היא כן מגדילה את המכנה ($n$). מה קורה לשבר?", "examTrap": "תצפית = הממוצע → ממוצע לא זז, פיזור **קטן**. זו התשובה הכי לא-אינטואיטיבית ולכן הכי נשאלת.", "requiresCalculator": false, "estimatedTime": 90}, {"id": "s1-07", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "השפעה על ממוצע ופיזור", "skill": "הוספה והסרה של תצפיות והשפעתן על השונות", "difficulty": 3, "sourceType": "reconstructed_exam", "sourceName": "מועד א' תשפ\"ג (שחזור)", "sourceYear": "2023", "confidence": "likely", "stem": "במבחן התקבלו הציונים הבאים: 60, 70, 80, 80, 90, 100.\nבשלב א' נוסף תלמיד שקיבל 80. בשלב ב' (לאחר הוספת התלמיד בשלב א') התלמיד שקיבל 60 עזב.\nמה יקרה לשונות?  בשלב א' _____ , בשלב ב' _____", "options": ["לא תשתנה, תקטן", "לא תשתנה, תגדל", "תגדל, תגדל", "תקטן, תקטן"], "correctAnswer": 3, "shortExplanation": "הממוצע הוא 80. שלב א' מוסיף תצפית ששווה לממוצע → שונות **קטנה**. שלב ב' מסיר את התצפית הרחוקה ביותר → שונות **קטנה** שוב.", "fullSolution": "**קודם כל — מהו הממוצע?**\n$$\\bar{x} = \\frac{60+70+80+80+90+100}{6} = \\frac{480}{6} = 80$$\nזה המפתח לכל השאלה.\n\n**שלב א' — מוסיפים תלמיד עם 80:**\nהתצפית החדשה שווה **בדיוק לממוצע**. היא תורמת $(80-80)^2 = 0$ לסכום הסטיות הריבועיות, אבל מגדילה את $n$ מ-6 ל-7.\n$$S^2 = \\frac{\\sum(x_i-\\bar{x})^2}{n} \\;\\Rightarrow\\; \\frac{\\text{מונה זהה}}{\\text{מכנה גדול יותר}} \\;\\Rightarrow\\; \\textbf{השונות קטנה}$$\n(הממוצע נשאר 80.)\n\n**שלב ב' — התלמיד עם 60 עוזב:**\n60 הוא הערך ה**רחוק ביותר** מהממוצע (מרחק 20). הסרת התצפית הכי קיצונית מורידה מהמונה את התרומה הגדולה ביותר.\n\nנחשב כדי לוודא. אחרי שלב א': 60, 70, 80, 80, 80, 90, 100 (ממוצע 80).\nסכום סטיות ריבועיות $= 400+100+0+0+0+100+400 = 1000$, ו-$S^2 = 1000/7 \\approx 142.9$\n\nאחרי שלב ב': 70, 80, 80, 80, 90, 100. ממוצע חדש $= 500/6 \\approx 83.3$\nסכום סטיות ריבועיות $\\approx 177.8+11.1+11.1+11.1+44.4+277.8 = 533.3$, ו-$S^2 = 533.3/6 \\approx 88.9$\n\n$88.9 < 142.9$ → **השונות קטנה** שוב. ✓\n\n\\boxed{ד — תקטן, תקטן}", "distractorExplanations": ["'לא תשתנה' בשלב א' — זו הטעות הקלאסית. נכון שהתצפית שווה לממוצע ולכן **הממוצע** לא משתנה, אבל **השונות כן** — היא קטנה, כי n גדל בזמן שהמונה נשאר קבוע.", "גם 'לא תשתנה' שגוי (ראי לעיל), וגם 'תגדל' בשלב ב' שגוי — הסרת הערך הרחוק ביותר מקטינה פיזור.", "'תגדל' בשלב א' שגוי — תצפית על הממוצע לא מוסיפה פיזור, היא מדללת אותו.", ""], "hint1": "לפני הכל — חשבי את הממוצע של הסדרה. הוא בדיוק מספר שמופיע בשאלה.", "hint2": "שלב א': התצפית שנוספת שווה לממוצע. שלב ב': הערך שיוצא הוא הרחוק ביותר מהממוצע. מה כל אחד מהם עושה לפיזור?", "examTrap": "ערך = ממוצע → **ממוצע** לא זז, אבל **שונות קטנה**. אל תבלבלי בין השניים.", "requiresCalculator": false, "estimatedTime": 120}, {"id": "s1-08", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "השפעה על ממוצע ופיזור", "skill": "הסרת תצפית קיצונית", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021 (שחזור)", "sourceYear": "2021", "confidence": "likely", "stem": "נתונה סדרה שהממוצע שלה 60 והשונות 25. אם מורידים ממנה את הערך 30, מה יקרה לממוצע ולשונות?", "options": ["הממוצע יגדל, השונות תקטן", "הממוצע יגדל, אי אפשר לדעת מה יקרה לשונות", "הממוצע לא ישתנה, השונות תקטן", "הממוצע יגדל, השונות תגדל"], "correctAnswer": 0, "shortExplanation": "30 נמצא **הרבה מתחת** לממוצע (60). הסרתו מושכת את הממוצע **למעלה** ומורידה את התצפית הכי קיצונית → פיזור **קטן**.", "fullSolution": "**הממוצע:** מסירים ערך שנמצא **מתחת** לממוצע (30 < 60). כשמורידים ערך נמוך, מה שנשאר גבוה יותר בממוצע → **הממוצע יגדל**. ✓\n\n**השונות:** נחשב כמה רחוק 30 מהממוצע.\n- סטיית התקן היא $\\sqrt{25} = 5$.\n- המרחק של 30 מהממוצע הוא $|30-60| = 30$ — כלומר **6 סטיות תקן**!\n\nזו תצפית קיצונית מאוד (outlier). היא תורמת $30^2 = 900$ לסכום הסטיות הריבועיות, בעוד שתצפית ממוצעת תורמת בערך 25. הסרת התצפית שתורמת הכי הרבה לפיזור **מקטינה את השונות** באופן דרמטי.\n\n\\boxed{א — הממוצע יגדל, השונות תקטן}", "distractorExplanations": ["", "'אי אפשר לדעת' — כן אפשר. 30 רחוק 6 סטיות תקן מהממוצע, כלומר הוא התצפית הקיצונית ביותר בסדרה. הסרתה בוודאות מקטינה פיזור.", "הממוצע **כן** ישתנה. הסרת ערך שנמצא מתחת לממוצע מושכת את הממוצע כלפי מעלה. (זה היה נכון רק אילו הערך המוסר היה שווה ל-60.)", "השונות לא תגדל — הסרנו את התצפית הכי רחוקה, וזה בהכרח מצמצם את הפיזור."], "hint1": "כמה סטיות תקן רחוק הערך 30 מהממוצע 60? (זכרי: $S = \\sqrt{S^2}$.)", "hint2": "$S=5$, והמרחק הוא 30 — כלומר **6 סטיות תקן**. זו התצפית הכי חריגה שיש. מה קורה כשמסירים אותה?", "examTrap": "מסירים ערך **מתחת** לממוצע → ממוצע עולה. מסירים ערך **קיצוני** → פיזור יורד.", "requiresCalculator": false, "estimatedTime": 90}, {"id": "s1-09", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "הוספת קבוע", "skill": "הוספת קבוע לכל התצפיות — השפעה על ציון תקן", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' תשפ\"ג (שחזור)", "sourceYear": "2023", "confidence": "verified", "stem": "היה מבחן באנגלית. ציון התקן של ירון היה 1.5. המורה הוסיפה לכל תלמיד 5 נקודות. איך ישתנה ציון התקן של ירון לאחר הוספת הנקודות?", "options": ["ציון התקן של ירון יגדל ב-5 נקודות", "ציון התקן של ירון לא ישתנה", "ציון התקן של ירון יגדל, אבל לא ניתן לדעת בכמה", "לא ניתן לדעת איך ישתנה ציון התקן של ירון"], "correctAnswer": 1, "shortExplanation": "הוספת קבוע לכולם מזיזה את הציון **ואת הממוצע** באותה מידה, ולא נוגעת בסטיית התקן. לכן $z$ נשאר זהה.", "fullSolution": "ציון התקן מוגדר:\n$$z = \\frac{x - \\bar{x}}{S}$$\n\nכשמוסיפים 5 לכל תלמיד:\n- **הציון של ירון:** $x \\to x+5$\n- **הממוצע:** $\\bar{x} \\to \\bar{x}+5$ (הממוצע זז באותו קבוע!)\n- **סטיית התקן:** $S \\to S$ — **לא משתנה**. הוספת קבוע מזיזה את כל ההתפלגות ימינה בגוש אחד; המרחקים בין התצפיות נשארים בדיוק אותם מרחקים.\n\nנציב:\n$$z_{new} = \\frac{(x+5) - (\\bar{x}+5)}{S} = \\frac{x + 5 - \\bar{x} - 5}{S} = \\frac{x-\\bar{x}}{S} = z$$\n\nה-5-ים **מתבטלים**. ציון התקן נשאר \\boxed{1.5 — לא משתנה}\n\n**האינטואיציה:** ציון תקן מודד *מיקום יחסי* — כמה סטיות תקן את מעל הממוצע. אם כולם קיבלו 5 נקודות מתנה, אף אחד לא התקדם ביחס לאף אחד. המיקום היחסי של ירון בכיתה זהה לחלוטין.", "distractorExplanations": ["לא. ציון התקן הוא לא בנקודות גולמיות — הוא ביחידות של סטיית תקן. ובכל מקרה, הוא בכלל לא גדל.", "", "הוא לא יגדל בכלל. גם המונה וגם הממוצע זזו ב-5, וההפרש ביניהם נשאר זהה.", "בהחלט ניתן לדעת: הוא נשאר 1.5. זו תוצאה ודאית שנובעת ישירות מהנוסחה."], "hint1": "כתבי את הנוסחה $z=\\frac{x-\\bar{x}}{S}$ ושאלי: מה קורה לכל אחד משלושת הרכיבים כשמוסיפים 5 לכולם?", "hint2": "$x$ גדל ב-5. $\\bar{x}$ **גם** גדל ב-5. $S$ לא משתנה. הציבי בנוסחה וראי מה קורה.", "examTrap": "הוספת קבוע לכולם: ממוצע זז, **פיזור לא**, ציון תקן **לא משתנה**.", "requiresCalculator": false, "estimatedTime": 75}, {"id": "s1-10", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "בחירת גרף לפי סולם", "skill": "התאמת סוג גרף לסולם המדידה", "difficulty": 1, "sourceType": "official_practice", "sourceName": "שאלות חזרה רשמיות", "sourceYear": "2026", "confidence": "verified", "stem": "עיריית תל אביב מעוניינת להציג את מספר התושבים בכל אחד מ-5 האזורים בעיר. איזה גרף/ים הכי מתאים/ים למטרה זו?", "options": ["עוגה", "היסטוגרמה", "עמודות", "עוגה ועמודות"], "correctAnswer": 3, "shortExplanation": "'אזור בעיר' הוא משתנה **שמי** (קטגוריאלי). לקטגוריאלי מתאימים גם עוגה וגם עמודות. היסטוגרמה שמורה למשתנים רציפים בלבד.", "fullSolution": "**שלב 1 — מהו סולם המשתנה?** המשתנה המוצג הוא 'אזור בעיר' — צפון, דרום, מרכז... אין ביניהם סדר ואין מרחקים. זהו סולם **שמי** (קטגוריאלי).\n\n**שלב 2 — איזה גרף מתאים לשמי?**\n\n| סולם | גרף מתאים |\n|---|---|\n| שמי / סדר (קטגוריאלי) | **עוגה** או **עמודות** |\n| רווח / מנה (רציף) | **היסטוגרמה** או פוליגון |\n\nההבדל המהותי: בהיסטוגרמה **העמודות נוגעות זו בזו**, כי הן מייצגות רצף מספרי ללא פערים. בגרף עמודות יש **רווחים** בין העמודות, כי הקטגוריות נפרדות.\n\nכאן, 5 אזורים = 5 קטגוריות נפרדות, ויש להן סכום כולל (סך תושבי העיר) — כך שגם עוגה (שמראה חלקים מתוך שלם) וגם עמודות (שמשוות גדלים) עובדות.\n\n\\boxed{ד — עוגה ועמודות}", "distractorExplanations": ["עוגה לבדה — נכונה, אבל לא מלאה. גם עמודות מתאים.", "היסטוגרמה — **שגוי**. היסטוגרמה מיועדת למשתנה **רציף** (גיל, משקל, ציון), שבו העמודות נוגעות זו בזו כי יש רצף. 'אזור בעיר' אינו רצף.", "עמודות לבדו — נכון, אבל לא מלא. גם עוגה מתאים.", ""], "hint1": "מה סולם המדידה של 'אזור בעיר'? האם יש סדר או מרחק בין 'צפון' ל'דרום'?", "hint2": "זה סולם שמי. עכשיו: אילו גרפים מותרים לסולם שמי — ושימי לב שיש **יותר מאחד**.", "examTrap": "היסטוגרמה = רק למשתנה רציף (עמודות נוגעות). קטגוריאלי = עוגה או עמודות (יש רווחים).", "requiresCalculator": false, "estimatedTime": 60}, {"id": "s1-11", "topic": "סולמות מדידה וטרנספורמציות", "subtopic": "בחירת גרף לפי סולם", "skill": "התאמת גרף לכל אחד מכמה מש alculator": false, "estimatedTime": 90}, {"id": "2021-02", "topic": "סולמות מדידה וגרפים", "subtopic": "סולמות מדידה וגרפים", "skill": "ה-CF האחרון = N. אין לסכום את עמודת השכיחות המצטברת.", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021", "sourceYear": "", "confidence": "likely", "stem": "בהמשך לשאלה הקודמת — כמה ילדים סך הכל יש במחקר?", "options": ["64", "32", "26", "15"], "correctAnswer": 2, "shortExplanation": "ה-CF האחרון = N. אין לסכום את עמודת השכיחות המצטברת.", "fullSolution": "המשבצת האחרונה בעמודת השכיחות המצטברת שווה תמיד ל-N, סך כל המקרים. כאן ה-CF האחרון הוא 26, ולכן N = 26. 15 היא ה-CF הראשון (מספר הילדים שראו חשופית אחת) ולא הסך הכל; 64 ו-32 הם תוצאה של סכימת עמודת ה-CF עצמה — טעות קלאסית, כי ערכי ה-CF כבר מכילים בתוכם את השכיחויות הקודמות וסכימתם סופרת ילדים פעמים רבות.", "distractorExplanations": [], "hint1": "", "hint2": "", "examTrap": "ה-CF האחרון = N. אין לסכום את עמודת השכיחות המצטברת.", "requiresCalculator": false, "estimatedTime": 90}, {"id": "2021-03", "topic": "מדדי פיזור וטרנספורמציות", "subtopic": "מדדי פיזור וטרנספורמציות", "skill": "הורדת ערך מתחת לממוצע ⇐ הממוצע עולה. הורדת ערך רחוק מהממוצע (במונחי סטיות תקן) ⇐ השונות יורדת.", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021", "sourceYear": "", "confidence": "likely", "stem": "אם יש סדרה שהממוצע שלה 60 והשונות 25, ומורידים ממנה את הערך 30 — מה יקרה לממוצע ולשונות?", "options": ["ממוצע יגדל, שונות תקטן", "ממוצע יגדל, אי אפשר לדעת מה יקרה לשונות", "ממוצע לא ישתנה, השונות תקטן", "ממוצע יגדל, השונות תגדל"], "correctAnswer": 0, "shortExplanation": "הורדת ערך מתחת לממוצע ⇐ הממוצע עולה. הורדת ערך רחוק מהממוצע (במונחי סטיות תקן) ⇐ השונות יורדת.", "fullSolution": "הערך 30 נמוך מהממוצע (60), ולכן הסרתו מושכת את הממוצע כלפי מעלה — הממוצע יגדל. לגבי השונות: סטיית התקן היא √25 = 5, כלומר הערך 30 רחוק מהממוצע 6 סטיות תקן — הוא ערך קיצוני מאוד. הסרת ערך קיצוני מסירה תרומה עצומה לסכום ריבועי הסטיות ולכן השונות תקטן. ג' שגויה כי הממוצע כ  "ציוני תקן והתפלגות נורמלית", "subtopic": "ציוני תקן והתפלגות נורמלית", "skill": "אין נורמליות ⇐ אין טבלת z ⇐ ציון תקן לא מתורגם לאחוזון. אל תניחו נורמליות אם לא נכתבה.", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021", "sourceYear": "", "confidence": "likely", "stem": "בהתפלגות השכר בארה\"ב, ציון התקן של שכרו של אבי הוא 1.96. מה בהכרח נכון?", "options": ["95% מהאוכלוסיה מרוויחה פחות מאבי.", "אבי ב-5% מקבלי המשכורות הגבוהות ביותר.", "אף תשובה אינה נכונה.", "האחוזון של אבי מושפע מגודל סטיית התקן באוכלוסייה."], "correctAnswer": 2, "shortExplanation": "אין נורמליות ⇐ אין טבלת z ⇐ ציון תקן לא מתורגם לאחוזון. אל תניחו נורמליות אם לא נכתבה.", "fullSolution": "התרגום מציון תקן לאחוזון (טבלת z) חוקי רק אם ההתפלגות נורמלית. התפלגות שכר היא הדוגמה הקלאסית להתפלגות א-סימטרית חיובית, ובשאלה לא נאמר שהיא נורמלית — לכן אסור להסיק ש-z=1.96 פירושו אחוזון 97.5 או '5% העליונים'. א' ו-ב' נופלות בדיוק במלכודת הזו. ד' שגויה כי ציון התקן כבר מנוטרל מסטיית התקן (הוא מודד מרחק ביחידות של סטיות תקן), והאחוזון תלוי בצורת ההתפלגות ולא בגודל ה-σ. לכן ג' — אף תשובה אינה נכונה.", "distractorExplanations": [], "hint1": "", "hint2": "", "examTrap": "אין נורמליות ⇐ אין טבלת z ⇐ ציון תקן לא מתורגם לאחוזון. אל תניחו נורמליות אם לא נכתבה.", "requiresCalculator": false, "estimatedTime": 90}, {"id": "2021-06", "topic": "התפלגות הדגימה", "subtopic": "התפלגות הדגימה", "skill": "n גדול ⇐ שגיאת תקן קטנה ⇐ הממוצעים מתרכזים סביב μ. לכל ערך מעל μ, ההסתברות להיות מתחתיו גדלה עם n.", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021", "sourceYear": "", "confidence": "likely", "stem": "נתונה אוכלוסיה עם ממוצע 80 וסטיית תקן 10. חוקר א' בנה התפלגות דגימה עם מדגם בגודל 25, חוקר ב' בנה התפלגות דגימה עם מדגם בגודל 100. איפה יש סיכוי גדול יותר לדגום מדגם אקראי שהממוצע שלו יהיה שווה או קטן מ-85? השלימו: בקבוצה עם מדגם 25 הסיכוי ___ הסיכוי בקבוצה עם מדגם 100 לממוצע שווה או קטן מ-85.", "options": ["קטן מ-", "גדול מ-", "קטן מ- או גדול מ- או שווה ל-", "שווה ל-"], "correctAnswer": 0, "shortExplanation": "n גדול ⇐ שגיאת תקן קטנה ⇐ הממוצעים מתרכזים סביב μ. לכל ערך מעל μ, ההסתברות להיות מתחתיו גדלה עם n.", "fullSolution": "שגיאת התקן של הממוצע היא σ/√n. עבור n=25: 10/5 = 2, ולכן z = (85−80)/2 = 2.5. עבור n=100: 10/10 = 1, ולכן z = (85−80)/1 = 5. ההסתברות לקבל ממוצע קטן או שווה ל-85 היא השטח משמאל ל-z, וככל ש-z גדול יותר השטח משמאלו גדול יותר — לכן במדגם 100 (z=5, כמעט 100%) ההסתברות גדולה יותר מאשר במדגם 25 (z=2.5, כ-99.4%). מכאן שהסיכוי במדגם 25 קטן מהסיכוי במדגם 100. ד' שגויה כי גודל המדגם משנה את שגיאת התקן; ב' הופכת את הכיוון; ג' חסרת משמעות כאן כי אפשר לחשב בדיוק.", "distractorExplanations": [], "hint1": "", "hint2": "", "examTrap": "n גדול ⇐ שגיאת תקן קטנה ⇐ הממוצעים מתרכזים סביב μ. לכל ערך מעל μ, ההסתברות להיות מתחתיו גדלה עם n.", "requiresCalculator": false, "estimatedTime": 90}, {"id": "2021-07", "topic": "ציוני תקן והתפלגות נורמלית", "subtopic": "ציוני תקן והתפלגות נורמלית", "skill": "ציוני תקן משווים מיקום יחסי, לא ציונים גולמיים בין מבחנים שונים.", "difficulty": 2, "sourceType": "reconstructed_exam", "sourceName": "מועד א' 2021", "sourceYear": "", "confidence": "likely", "stem": "ציונו של הראשון במבחן בחשבון הוא z=-1.23, ציונו של השני במבחן באנגלית הוא z=-1.56. מה ניתן לדעת בוודאות?", "options": ["ציונו של הראשון גדול מזה של השני.", "אי אפשר לדעת.", "ציונו של השני גדול מזה של הראשון.", "תלוי רק בממוצע של כל מבחן."], "correctAnswer": 1, "shortExplanation": "ציוני תקן משווים מיקום יחסי, לא ציונים גולמיים בין מבחנים שונים.", "fullSolution": "מדובר בשני מבחנים שונים לגמרי (חשבון ואנגלית), עם ממוצעים וסטיות תקן שונים ולא ידועים. ציון תקן מאפשר להשוות מיקום יחסי בתוך ההתפלגות של אותו מבחן, אך אינו מאפשר להשוות ציונים גולמיים בין שני מבחנים שונים — הראשון יכול לקבל 40 גולמי והשני 70 גולמי, ועדיין ה-z של הראשון גבוה יותר. לכן א' ו-ג' שתיהן קופצות למסקנה על הציון הגולמי. ד' שגויה כי גם הממוצע וגם סטיית התקן של כל מבחן נחוצים, ובכל מקרה הם אינם ידועים. לכן: אי אפשר לדעת.", "distractorExplanations": [], "hint1": "", "hint2 function md(t){
  if(!t) return "";
  // 1. שולפים את הנוסחאות החוצה לפני כל עיבוד, כדי שה-escaping לא יהרוס אותן
  const math = [];
  let h = String(t)
    .replace(/\$\$([\s\S]+?)\$\$/g, (_,x)=> "␀M"+(math.push({x, d:true})-1)+"␀")
    .replace(/\$([^$\n]+?)\$/g,     (_,x)=> "␀M"+(math.push({x, d:false})-1)+"␀")
    .replace(/\\boxed\{([^}]+)\}/g, (_,x)=> "␀B"+(math.push({x, d:false})-1)+"␀");

  // 2. עכשיו בטוח לברוח מ-HTML ולעבד markdown
  h = h
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>");
  // markdown tables
  h = h.replace(/((?:^\|.*\|\s*$\n?)+)/gm, (blk)=>{
    const rows = blk.trim().split("\n").filter(r=>r.trim().startsWith("|"));
    if(rows.length<2) return blk;
    const cells = r => r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
    const body = rows.filter(r=>!/^\|[\s:\-|]+\|$/.test(r.trim()));
    let out = "<table>";
    body.forEach((r,i)=>{
      const tag = i===0 ? "th":"td";
      out += "<tr>" + cells(r).map(c=>`<${tag}>${c}</${tag}>`).join("") + "</tr>";
    });
    return out + "</table>";
  });

  // 3. מחזירים את הנוסחאות פנימה, מרונדרות
  h = h.replace(/\s([MB])(\d+)\s/g, (_,kind,n)=>{
    const m = math[+n];
    if(!m) return " ";
    let inner;
    if(window.katex){
      try{ inner = katex.renderToString(m.x, {displayMode:m.d, throwOnError:false}); }
      catch(e){ inner = m.x; }
    } else {
      inner = m.x; // KaTeX עדיין לא נטען — מציגים את הביטוי הגולמי, עדיף מכלום
    }
    if(kind==="B") return ` <span class="boxed">${inner}</span> `;
    return m.d ? `<div class="disp">${inner}</div>` : ` ${inner} `;
  });
  return h;
}

      <p style="margin:8px 0 0">כל שאלה שתעני עליה כאן תעדכן תחזית לציון שלך במבחן. תתחילי ותראי את המספר עולה.</p>
    `}
  </div>

  <div class="modes">
    <button class="mode primary" data-go="smart">
      <span class="ic">🎯</span>
      <span><b>תרגול חכם</b><span>מתחיל מהטעויות שלך ומהנושאים ששווים הכי הרבה נקודות</span></span>
    </button>`;
  if(wrong.length) h += `
    <button class="mode" data-go="wrong">
      <span class="ic">🔁</span>
      <span><b>רק מה שטעיתי</b><span>${wrong.length} שאלות שנפלת בהן או ניחשת</span></span>
    </button>`;
  h += `
    <button class="mode" data-go="exam">
      <span class="ic">⏱️</span>
      <span><b>סימולציית מבחן</b><span>30 שאלות · בלי רמזים · ציון בסוף</span></span>
    </button>
  </div>

  <div class="card">
    <h2>⚡ הדבר שחייבים לדעת</h2>
    <p>המבחן הוא <b>30 שאלות אמריקאיות, כמעט בלי חישובים</b>. הוא בודק אם את נופלת במלכודות, לא אם את יודעת לחשב. אין טעם לשנן נוסחאות — יש טעם ללמוד את המלכודות.</p>
  </div>

  <div class="h-sec">קומה 1 · הנושא של עכשיו</div>`;

  const q1 = ALL.filter(q=>q.topic===F1);
  const [lv1, cl1] = level(st1);
  h += `
  <button class="topic" data-topic="${F1}">
    <span class="nm">
      <b>${F1}</b>
      <span class="meta">${st1.done}/${st1.total} נענו · ${q1.length} שאלות</span>
      <span class="bar"><i style="width:${st1.total? 100*st1.done/st1.total:0}%"></i></span>
    </span>
    <span class="pill ${cl1}">${lv1}</span>
  </button>
  <button class="mode" data-go="learn" style="margin-top:8px">
    <span class="ic">📖</span>
    <span><b>ללמוד את הנושא קודם</b><span>דף קצר: הכללים והמלכודות, 5 דקות</span></span>
  </button>

  <div class="h-sec">שאר הנושאים · שאלות מהמבחנים</div>`;

  for(const [t, qs] of topics()){
    if(t===F1) continue;
    const st = stat(qs); const [lv, cl] = level(st);
    const skipped = S.skipTopics.includes(t);
    h += `
    <button class="topic" data-topic="${t}" ${skipped?'style="opacity:.45"':''}>
      <span class="nm">
        <b>${t}</b>
        <span class="meta">${skipped ? "דילגת על הנושא" : `${st.done}/${st.total} נענו`}</span>
        <span class="bar"><i style="width:${st.total? 100*st.done/st.total:0}%"></i></span>
      </span>
      <span class="pill ${cl}">${skipped?"דילוג":lv}</span>
    </button>`;
  }
  app.innerHTML = h;
  app.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{
    const g=b.dataset.go;
    if(g==="learn") return learn();
    if(g==="exam")  return start(shuffle(ALL).slice(0,30), {exam:true, name:"סימולציית מבחן"});
    if(g==="wrong") return start(queue(ALL.filter(q=>{const r=S.seen[q.id];return r&&(r.wrong>0||r.guessed);})), {name:"רק מה שטעיתי"});
    // smart: floor-1 mistakes first, then floor-1 fresh, then everything else
    const pool = [...ALL.filter(q=>q.topic===F1), ...ALL.filter(q=>q.topic!==F1 && !S.skipTopics.includes(q.topic))];
    start(queue(pool), {name:"תרגול חכם"});
  });
  app.querySelectorAll("[data-topic]").forEach(b=>b.onclick=()=>{
    const t=b.dataset.topic;
    start(queue(ALL.filter(q=>q.topic===t)), {name:t, topic:t});
  });
}

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- learn page (floor 1) ---------- */
function learn(){
  backBtn.hidden=false; window.scrollTo(0,0);
  app.innerHTML = `
  <div class="card">
    <h2>סולמות מדידה וטרנספורמציות</h2>
    <p class="muted">5 דקות. זה כל מה שצריך כדי לענות על השאלות בנושא.</p>
  </div>

  <div class="card">
    <h2>1 · ארבעת הסולמות</h2>
    <div class="sol">| סולם | מה יש בו | דוגמה | מה מותר |
|---|---|---|---|
| **שמי** | רק תוויות | מגדר, צבע עיניים | כל טרנספורמציה חח"ע |
| **סדר** | סדר, בלי מרחקים שווים | דירוג, שביעות רצון | כל טרנספורמציה **עולה** |
| **רווח** | מרחקים שווים, אפס שרירותי | צלזיוס, IQ | $y=ax+b$ עם $a>0$ |
| **מנה** | + אפס מוחלט | משקל, גיל, מס' ילדים | $y=ax$ עם $a>0$ |

**הכלל שפותר חצי מהשאלות:** ככל שהסולם חזק יותר — **פחות** מותר לעשות בו.

**מבחן האפס:** האם 0 אומר "אין כלום"? כן → מנה. לא → רווח.
לכן **"פי 2" מותר רק בסולם מנה.** 20°C אינם פי 2 מ-10°C.</div>
  </div>

  <div class="card">
    <h2>2 · טרנספורמציות — הטבלה שחייבים לזכור</h2>
    <div class="sol">| פעולה | ממוצע | חציון | שונות | סטיית תקן | ציון תקן |
|---|---|---|---|---|---|
| **הוספת קבוע $b$** | $+b$ | $+b$ | **לא משתנה** | **לא משתנה** | **לא משתנה** |
| **הכפלה בקבוע $c$** | $\\times c$ | $\\times c$ | $\\times c^2$ | $\\times |c|$ | **לא משתנה** |

**האינטואיציה:** הוספת קבוע **מזיזה** את ההתפלגות בגוש אחד. הכפלה **מותחת** אותה.
**רק מתיחה משנה פיזור.**

⚠️ שימי לב: השונות מוכפלת ב-$c^2$, לא ב-$c$. זו הטעות הכי נפוצה.

עבור $y = cx + b$ ביחד: $\\;\\bar{y}=c\\bar{x}+b\\;$ אבל $\\;S_y=|c|\\cdot S_x\\;$ — **ה-$b$ נעלם מהפיזור.**</div>
  </div>

  <div class="card">
    <h2>3 · הוספה והסרה של תצפית</h2>
    <div class="sol">| מה קורה | ממוצע | שונות |
|---|---|---|
| מוסיפים תצפית **= לממוצע** | **לא זז** | **קטנה** ⚠️ |
| מוסיפים תצפית **רחוקה** מהממוצע | זז לכיוונה | **גדלה** |
| מסירים תצפית **קיצונית** | זז מהכיוון שלה | **קטנה** |

**למה תצפית ששווה לממוצע מקטינה שונות?**
היא תורמת $(x-\\bar{x})^2 = 0$ למונה, אבל **מגדילה את $n$** במכנה.
מונה קבוע ÷ מכנה גדול יותר = מספר קטן יותר.

זו התשובה הכי לא-אינטואיטיבית בנושא, ולכן **הכי נשאלת**.</div>
  </div>

  <div class="card">
    <h2>4 · גרפים</h2>
    <div class="sol">| סולם | גרף |
|---|---|
| שמי / סדר (קטגוריאלי) | **עוגה** או **עמודות** (יש רווחים) |
| רווח / מנה (רציף) | **היסטוגרמה** (עמודות נוגעות) |

⚠️ סולם **סדר** → עמודות, **לא** היסטוגרמה. היסטוגרמה דורשת מרחקים שווים.</div>
  </div>

  <div class="card" style="border-color:var(--accent)">
    <h2>⚠️ 5 · המלכודות שחוזרות כל שנה</h2>
    <div class="sol">1. **"פי כמה"** מותר רק במנה. בדקי: האם 0 = "אין כלום"?
2. קטגוריית **"אחר"** הופכת סולם סדר-לכאורה ל**שמי**.
3. הוספת קבוע: **מרכז זז, פיזור לא.** ציון תקן **לא** משתנה.
4. תצפית = ממוצע → ממוצע **קופא**, שונות **קטנה**.
5. השונות מוכפלת ב-$c$ **בריבוע**.
6. **הטווח** מושפע רק מ-2 תצפיות. לא כל מדדי הפיזור מושפעים מכולן.
7. **"איכותי" ≠ "שמי"** — איכותי כולל גם סדר.
8. סך הנבדקים = השכיחות המצטברת **האחרונה**, לא סכום המצטברות.</div>
  </div>

  <button class="btn wide" id="go">מתחילה לתרגל ←</button>`;
  app.querySelectorAll(".sol").forEach(n=>{ n.innerHTML = md(n.textContent); tex(n); });
  document.getElementById("go").onclick = () => start(queue(ALL.filter(q=>q.topic===F1)), {name:F1, topic:F1});
}

/* ---------- practice / exam ---------- */
let Q=[], i=0, opt={}, picked=null, hint=0, answered=false, log=[];

function start(list, o){
  if(!list.length){ home(); return; }
  Q=list; i=0; opt=o; log=[]; backBtn.hidden=false;
  document.getElementById("sub").textContent = o.name;
  show();
}

function show(){
  window.scrollTo(0,0);
  picked=null; hint=0; answered=false;
  if(i>=Q.length) return done();
  const q=Q[i];
  const [srcLabel, srcCls] = SRC[q.sourceType] || ["", ""];

  let h = `
  <div class="prog">
    <span>${i+1} / ${Q.length}</span>
    <span class="bar"><i style="width:${100*i/Q.length}%"></i></span>
  </div>
  <div class="card">
    <div class="qmeta">
      <span class="tag">${q.subtopic || q.topic}</span>
      <span class="tag src ${srcCls}">${srcLabel}${q.sourceYear? " · "+q.sourceYear : ""}</span>
    </div>
    <div class="stem" id="stem">${md(q.stem)}</div>
    <div class="opts" id="opts">
      ${q.options.map((o,k)=>`
        <button class="opt" data-k="${k}">
          <span class="ltr">${LTR[k]}</span><span>${md(o)}</span>
        </button>`).join("")}
    </div>
    <div id="fb"></div>
    <div class="acts" id="acts"></div>
  </div>`;
  app.innerHTML=h;
  tex(document.getElementById("stem"));
  tex(document.getElementById("opts"));

  app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(answered) return;
    picked = +b.dataset.k;
    check();
  });
  acts();
}

function acts(){
  const q=Q[i], a=document.getElementById("acts");
  if(answered) return;
  let h = "";
  if(!opt.exam && (q.hint1 || q.hint2)) h += `<button class="btn ghost" id="hint">💡 רמז</button>`;
  h += `<button class="btn ghost" id="skip">יודעת, דלגי ⏭️</button>`;
  a.innerHTML=h;
  const hb=document.getElementById("hint"); if(hb) hb.onclick = showHint;
  document.getElementById("skip").onclick = () => { const r=rec(q.id); r.skipped=true; save(); i++; show(); };
}

function showHint(){
  const q=Q[i]; hint++;
  rec(q.id).hinted = true; save();
  const fb=document.getElementById("fb");
  const txt = hint===1 ? (q.hint1||q.hint2) : (q.hint2||q.hint1);
  const box = el(`<div class="box hint"><h4>💡 רמז ${hint}</h4><div>${md(txt)}</div></div>`);
  fb.appendChild(box); tex(box);
  if(hint>=2 || !q.hint2){ const b=document.getElementById("hint"); if(b) b.remove(); }
}

function check(){
  const q=Q[i]; answered=true;
  const ok = picked === q.correctAnswer;
  const r = rec(q.id);
  if(ok) r.right++; else r.wrong++;
  save();
  log.push({q, picked, ok});

  app.querySelectorAll(".opt").forEach((b,k)=>{
    b.disabled=true; b.classList.remove("sel");
    if(k===q.correctAnswer) b.classList.add("right");
    else if(k===picked) b.classList.add("wrong");
  });

  if(opt.exam){ i++; return setTimeout(show, 120); }

  const fb=document.getElementById("fb");
  fb.innerHTML="";
  let h="";
  if(ok){
    h += `<div class="box good"><h4>✅ נכון</h4><div>${md(q.shortExplanation)}</div></div>`;
  } else {
    h += `<div class="box bad"><h4>❌ לא נכון — התשובה היא ${LTR[q.correctAnswer]}</h4>
      <div>${md(q.shortExplanation)}</div></div>`;
    if(q.distractorExplanations && q.distractorExplanations[picked]){
      h += `<div class="box bad" style="background:transparent"><h4>למה מה שסימנת שגוי</h4><div>${md(q.distractorExplanations[picked])}</div></div>`;
    }
  }
  if(q.fullSolution) h += `<div class="box" style="background:var(--bg);border:1px solid var(--line)"><h4>📝 פתרון מלא</h4><div class="sol">${md(q.fullSolution)}</div></div>`;

  const others = (q.distractorExplanations||[]).map((d,k)=> (d && k!==picked && k!==q.correctAnswer) ? `<div><b>${LTR[k]}:</b> ${md(d)}</div>` : "").join("");
  if(others) h += `<div class="box" style="background:var(--bg);border:1px solid var(--line)"><h4>שאר המסיחים</h4><div class="dis">${others}</div></div>`;

  if(q.examTrap) h += `<div class="box trap"><h4>🪤 מלכודת מבחן</h4><div>${md(q.examTrap)}</div></div>`;
  fb.innerHTML=h; tex(fb);

  const a=document.getElementById("acts");
  a.innerHTML = (ok ? `<button class="btn ghost" id="guess">ניחשתי 🤷‍♀️</button>` : "") +
                `<button class="btn" id="next">${i+1>=Q.length? "סיום" : "הבאה ←"}</button>`;
  document.getElementById("next").onclick = () => { i++; show(); };
  const g=document.getElementById("guess");
  if(g) g.onclick = () => { rec(q.id).guessed = true; save(); g.textContent="סומן — נחזור לזה ✓"; g.disabled=true; };
}

function done(){
  window.scrollTo(0,0);
  const n=log.length, right=log.filter(x=>x.ok).length;
  const pct = n? Math.round(100*right/n) : 0;
  const missed = log.filter(x=>!x.ok);
  let h=`
  <div class="card center">
    <div class="big" style="color:${pct>=80?"var(--ok)":pct>=60?"var(--warn)":"var(--bad)"}">${pct}%</div>
    <p class="muted">${right} מתוך ${n} נכון</p>
  </div>`;

  if(opt.topic && !missed.length && n>=3){
    h += `<div class="card"><h2>🎉 את שולטת בזה</h2><p>ענית נכון על הכל. אפשר לדלג על הנושא הזה ולהשקיע במקום אחר.</p>
    <div class="acts"><button class="btn" id="skipT">דלגי על הנושא</button></div></div>`;
  }
  if(missed.length){
    h += `<div class="card"><h2>מה לחזור עליו</h2>`;
    const seenTraps = new Set();
    for(const m of missed){
      if(m.q.examTrap && !seenTraps.has(m.q.examTrap)){
        seenTraps.add(m.q.examTrap);
        h += `<div style="margin:8px 0;padding-inline-start:10px;border-inline-start:3px solid var(--bad)"><div style="font-size:14px">${md(m.q.examTrap)}</div></div>`;
      }
    }
    h += `<div class="acts"><button class="btn" id="again">תרגלי שוב את הטעויות (${missed.length})</button></div></div>`;
  }
  h += `<div class="acts"><button class="btn ghost wide" id="hm">חזרה למסך הבית</button></div>`;
  app.innerHTML=h;
  app.querySelectorAll(".card").forEach(c=>tex(c));
  const ag=document.getElementById("again");
  if(ag) ag.onclick = () => start(missed.map(m=>m.q), {name:"חזרה על הטעויות"});
  const sk=document.getElementById("skipT");
  if(sk) sk.onclick = () => { if(!S.skipTopics.includes(opt.topic)) S.skipTopics.push(opt.topic); save(); home(); };
  document.getElementById("hm").onclick = () => { document.getElementById("sub").textContent="מועד א' · 30 שאלות אמריקאיות"; home(); };
}

// KaTeX נטען ב-defer. מציירים את המסך הראשון רק אחרי שהוא מוכן,
// אחרת הנוסחאות במסך הראשון ייצאו כטקסט גולמי.
if(window.katex) home();
else window.addEventListener("load", home);
</script>
